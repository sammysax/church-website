backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "[skip ci] Upload “{{path}}”"
    deleteMedia: "[skip ci] Delete “{{path}}”"

# Uncomment below to enable drafts
# publish_mode: editorial_workflow

media_folder: "static/images/uploads" # Media files will be stored in the repo under static/images/uploads
public_folder: "/images/uploads" # The src attribute for uploaded media will begin with /images/uploads

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "content/hero.json"
        fields:
          - {label: "Title Line 1", name: "titleLine1", widget: "string"}
          - {label: "Title Line 2", name: "titleLine2", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "text"}
          - {label: "Primary Button Text", name: "primaryButtonText", widget: "string"}
          - {label: "Secondary Button Text", name: "secondaryButtonText", widget: "string"}
          - {label: "Secondary Button Link", name: "secondaryButtonLink", widget: "string"}

      - label: "About Section"
        name: "about"
        file: "content/about.json"
        fields:
          - {label: "General Superintendent", name: "superintendent", widget: "string"}
          - {label: "Mission", name: "mission", widget: "text"}
          - {label: "Vision", name: "vision", widget: "text"}
          - {label: "Community Members", name: "communityMembers", widget: "number"}
          - {label: "Years of Service", name: "yearsOfService", widget: "number"}
          - label: "Values"
            name: "values"
            widget: "list"
            fields:
              - {label: "Value", name: "value", widget: "string"}

      - label: "Contact Information"
        name: "contact"
        file: "content/contact.json"
        fields:
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}

  - name: "events"
    label: "Events"
    files:
      - label: "Upcoming Events"
        name: "upcoming_events"
        file: "content/events.json"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            summary: "{{fields.title}} - {{fields.date}}"
            fields:
              - {label: "Event Title", name: "title", widget: "string"}
              - {label: "Event Tag", name: "tag", widget: "string", required: false}
              - {label: "Event Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false}
              - {label: "Event Time", name: "time", widget: "string", required: false}
              - {label: "Event Description", name: "description", widget: "text", required: false}
              - {label: "Featured", name: "featured", widget: "boolean", default: false, required: false}

  - name: "programs"
    label: "Programs/Services"
    folder: "content/programs"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Day", name: "day", widget: "string"}
      - {label: "Program Name", name: "name", widget: "string"}
      - label: "Time Slots"
        name: "times"
        widget: "list"
        fields:
          - {label: "Time", name: "time", widget: "string"}


